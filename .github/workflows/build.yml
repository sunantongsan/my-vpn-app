name: Build Flutter App
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          
      - run: |
          # 1. สร้างโครงสร้างโปรเจกต์ใหม่ให้ถูกต้อง
          flutter create --project-name=my_vpn_app .
          
          # 2. แก้ปัญหาเซิร์ฟเวอร์โหลด Gradle ล่ม (504 Gateway)
          sed -i 's|distributionUrl=.*|distributionUrl=https://services.gradle.org/distributions/gradle-7.6.3-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          
          # 3. บังคับตั้งค่าเวอร์ชัน Android ให้รองรับระบบ VPN (minSdkVersion 26)
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 26/g' android/app/build.gradle
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g' android/app/build.gradle
          
          # 4. ล้างแคชและเริ่มบิวด์แอป
          flutter clean
          flutter pub get
          flutter build apk --split-per-abi --release
          
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/
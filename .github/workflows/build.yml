name: Build Flutter App
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. ตั้งค่า Java 17 ให้ตรงกับระบบของ Flutter (แก้ปัญหา Gradle พัง)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      # 2. เรียกใช้งาน Flutter 3.19
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          
      # 3. ขั้นตอนการสร้างและประกอบแอป
      - run: |
          # สร้างโครงสร้างระบบใหม่ทั้งหมดโดยใช้ชื่อที่ถูกต้อง
          flutter create --project-name=my_vpn_app .
          
          # ล้างไฟล์ขยะตกค้างและดึงระบบกลับมาให้สะอาด
          flutter clean
          flutter pub get
          
          # เริ่มประกอบไฟล์ติดตั้งแบบแยกชิปประมวลผล
          flutter build apk --split-per-abi --release
          
      # 4. ส่งไฟล์เข้าสู่หน้าดาวน์โหลด Artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/
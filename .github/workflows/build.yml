name: Build Flutter App
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. ตั้งค่า Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      # 2. เรียกใช้งาน Flutter 3.19
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          
      # 3. ขั้นตอนการสร้างและประกอบแอป
      - run: |
          flutter create --project-name=my_vpn_app .
          
          # แก้ปัญหา Error 504: บังคับให้โหลด Gradle จากเซิร์ฟเวอร์หลักที่เสถียรกว่า
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-7.6.3-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          
          flutter clean
          flutter pub get
          flutter build apk --split-per-abi --release
          
      # 4. ส่งไฟล์เข้าสู่หน้าดาวน์โหลด
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/